<div class="form-grid">
  <label>Nombre
    <input type="text" name="name" value="{{ responsible.name }}" required maxlength="100" placeholder="Nombre y apellido">
  </label>
  <label>Área
    <select name="area">
      <option value="">Sin área</option>
      {% for area in AREAS %}<option value="{{ area }}" {% if responsible.area == area %}selected{% endif %}>{{ area }}</option>{% endfor %}
    </select>
  </label>
</div>
<div class="form-grid">
  <label>Correo
    <input type="email" name="email" value="{{ responsible.email }}" maxlength="160" placeholder="usuario@empresa.com">
  </label>
</div>
<div class="switch-grid">
  <label class="check-row"><input type="checkbox" name="notify_email" {% if responsible.notify_email %}checked{% endif %}> Notificar por correo</label>
  <label class="check-row"><input type="checkbox" name="active" {% if responsible.active %}checked{% endif %}> Responsable activo</label>
</div>
