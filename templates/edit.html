{% extends "base.html" %}
{% block content %}
<section class="hero edit-hero">
  <div>
    <h1>Editar acción</h1>
    <p>Actualiza responsables, prioridad, estado, área y fecha límite.</p>
  </div>
  <div class="hero-actions">
    <a class="btn secondary" href="{{ url_for('index') }}">Volver al tablero</a>
  </div>
</section>
<section class="edit-card">
  <form method="post" action="{{ url_for('editar', task_id=task.id) }}" class="task-form">
    {% include "task_form_fields.html" %}
    <div class="form-actions">
      <button type="submit">Guardar cambios</button>
      <a class="btn secondary" href="{{ url_for('index') }}">Cancelar</a>
    </div>
  </form>
</section>
{% endblock %}
