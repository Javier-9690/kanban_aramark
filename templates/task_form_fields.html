<label>Título de la acción
  <input type="text" name="title" value="{{ task.title }}" required maxlength="120" placeholder="Ej: Revisar cierre de módulo 15F">
</label>
<label>Descripción
  <textarea name="description" rows="4" placeholder="Detalle operativo de la acción">{{ task.description }}</textarea>
</label>
<div class="form-grid">
  <label>Estado
    <select name="status">
      {% for key, label in STATUSES %}<option value="{{ key }}" {% if task.status == key %}selected{% endif %}>{{ label }}</option>{% endfor %}
    </select>
  </label>
  <label>Prioridad
    <select name="priority">
      {% for pr in PRIORITIES %}<option value="{{ pr }}" {% if task.priority == pr %}selected{% endif %}>{{ pr }}</option>{% endfor %}
    </select>
  </label>
</div>
<label>Responsables asignados
  <select name="responsible_ids" multiple size="7" class="multi-select">
    {% for responsible in responsibles %}
      <option value="{{ responsible.id }}" {% if task.responsible_ids and (responsible.id|string) in task.responsible_ids %}selected{% endif %}>
        {{ responsible.name }}{% if responsible.area %} · {{ responsible.area }}{% endif %}{% if responsible.email %} · email{% endif %}
      </option>
    {% endfor %}
  </select>
  <small>Para seleccionar varios responsables: mantén Ctrl presionado y haz clic en cada nombre.</small>
</label>
<div class="form-grid">
  <label>Área
    <select name="area">
      <option value="">Sin área</option>
      {% for area in AREAS %}<option value="{{ area }}" {% if task.area == area %}selected{% endif %}>{{ area }}</option>{% endfor %}
    </select>
  </label>
</div>
<label>Fechas de ejecución / vencimiento
  <div class="date-manager" data-date-manager>
    <div class="date-add-row">
      <input type="date" data-date-input aria-label="Agregar fecha">
      <button type="button" class="btn secondary" data-add-date>Agregar fecha</button>
    </div>
    <div class="date-chip-list" data-date-list>
      {% set fechas = task.task_dates if task.task_dates is defined and task.task_dates else [] %}
      {% for fecha in fechas %}
      <span class="date-chip">
        <input type="hidden" name="task_dates" value="{{ fecha }}">
        <strong>{{ fecha }}</strong>
        <button type="button" data-remove-date aria-label="Quitar fecha">×</button>
      </span>
      {% endfor %}
    </div>
  </div>
  <small>Si agregas varias fechas, el sistema creará una tarjeta/acción independiente para cada día. Así podrás editar, mover o finalizar una fecha sin modificar las demás.</small>
</label>
