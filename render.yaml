services:
  - type: web
    name: aramark-kanban-operacional
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 --access-logfile - --error-logfile -
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_PATH
        value: /var/data/aramark_kanban.db
      - key: APP_BASE_URL
        value: https://kanban-aramark.onrender.com
      - key: EMAIL_PROVIDER
        value: brevo
      - key: NOTIFY_EMAIL
        value: true
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_FROM_EMAIL
        sync: false
      - key: BREVO_FROM_NAME
        value: Kanban Operacional Aramark
      - key: BREVO_TIMEOUT
        value: 8
    disk:
      name: aramark-kanban-data
      mountPath: /var/data
      sizeGB: 1
