services:
  - type: web
    name: aramark-kanban-operacional
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/aramark_kanban.db
      - key: APP_BASE_URL
        value: https://aramark-kanban-operacional.onrender.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_SSL
        value: false
    disk:
      name: aramark-kanban-data
      mountPath: /var/data
      sizeGB: 1
