services:
  - type: web
    name: aramark-kanban-operacional
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_PATH
        value: /var/data/aramark_kanban.db
      - key: APP_BASE_URL
        value: https://kanban-aramark.onrender.com
      - key: EMAIL_PROVIDER
        value: brevo
      - key: NOTIFY_EMAIL
        value: true
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_FROM_EMAIL
        sync: false
      - key: BREVO_FROM_NAME
        value: Kanban Operacional Aramark
      - key: BREVO_TIMEOUT
        value: 8
      - key: NOTIFY_WHATSAPP
        value: false
      - key: BREVO_WHATSAPP_TEMPLATE_ID
        sync: false
      - key: BREVO_WHATSAPP_SENDER_NUMBER
        sync: false
      - key: BREVO_WHATSAPP_LANGUAGE
        value: es
      - key: BREVO_WHATSAPP_TIMEOUT
        value: 8
      # SMTP queda como respaldo opcional, pero Brevo API es la opción recomendada en Render.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_SSL
        value: false
    disk:
      name: aramark-kanban-data
      mountPath: /var/data
      sizeGB: 1
